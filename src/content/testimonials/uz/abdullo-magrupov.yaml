quote: "O'z vaqtida men zip24 kompaniyasiga kuchli jamoasi tufayli qo'shilgandim, va Bekhruz mustahkam texnik bilimi va ko'nikmalari bilan yaxshi taassurot qoldirgan inson edi. zip24'dagi faoliyatim davomida Bekhruz loyihada chinakam muhim o'rin tutgan va uni yetaklagan sanoqli mutaxassislardan biri ekanini payqadim.\nBekhruz bilan ishlash haqiqatan ham zavqli edi — u o'rganishdan va yangiliklar bilan bo'lishishdan hech qachon to'xtamasdi. Bundan tashqari, unda dasturchi uchun doim asqotadigan ajoyib algoritmik ko'nikmalar bor.\nAytish mumkinki, u o'zi ishlaydigan barcha steklarni chuqur biladigan kamdan-kam fullstack dasturchilardan biri. Bekhruzning Java backend va Flutter ko'nikmalari birdek a'lo darajada.\nIshonch bilan ayta olaman: Bekhruzning har qanday kompaniya tarkibida bo'lishi ham kompaniya, ham jamoa uchun chinakam foyda."
