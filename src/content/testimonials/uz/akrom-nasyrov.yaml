name: "Akrom Nasyrov"
role: "Dasturiy ta'minot bo'limi rahbari va yetakchi muhandis"
company: "East Telecom"
quote: "Men Bekhruz Makhmudovni o'z sohasida noyob iste'dod deb bilaman. Senior dasturchi sifatida u mobil ilovalar ishlab chiqishda chuqur tajribaga ega. Uning East Telecom'ga qo'shgan hissasi bebaho — ayniqsa HRMS dasturini ishlab chiqishda uning sa'y-harakatlari loyiha muvaffaqiyatida muhim rol o'ynadi.\n\nU bilan hamkorlik qilish maroqli, va ishonchim komilki, birgalikda biz ajoyib loyihalarni amalga oshiramiz. Jamoamda shunday yuqori malakali mutaxassislarning bo'lishi ham sharaf, ham katta g'urur manbai."
