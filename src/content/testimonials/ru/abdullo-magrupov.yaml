quote: "В своё время я пришёл в компанию zip24 из-за сильной команды, и Бехруз был тем человеком, который произвёл хорошее впечатление благодаря прочным техническим знаниям и навыкам. За время работы в zip24 я заметил, что Бехруз был одним из немногих, кто играл по-настоящему важную роль и вёл проект.\nРаботать с Бехрузом было действительно приятно: он никогда не переставал учиться и делиться новым. К тому же у него выдающиеся алгоритмические навыки, что всегда ценно для разработчика.\nМожно сказать, что он один из немногих fullstack-разработчиков с глубокими знаниями всех стеков, с которыми работает. В случае Бехруза его навыки Java-бэкенда и Flutter одинаково превосходны.\nМогу с уверенностью сказать: Бехруз в составе любой компании — это реальная польза и для компании, и для команды."
