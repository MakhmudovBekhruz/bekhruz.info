quote: "At the time I joined the zip24 company because of strong team and Bekhruz was the guy who made good impression because of his solid technical knowledge and skills.Throughout my career at zip24, I noticed that Bekhruz was one of the few guys who was very important and leading the project. \nIt was really enjoying to work with Bekhruz as he never stopped learning and sharing new things. He also has extraordinary algorithm skills which is always good to have for a software developer.\nIt can be said that he is one of the few full stack developers who has a deep knowledge on all the stacks he work. In Bekhruz's case I can say that his Java back-end and Flutter skills are equally excellent.\nI can easily say that Bekhruz being a part of any company is a real benefit for both company and the team."
